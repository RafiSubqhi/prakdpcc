<!DOCTYPE html>
<html>
<head>
    <title>Gaming Loadout</title>
</head>
<body>
    <h1 id="judul"></h1>
    <p id="owner"></p>
    <p id="nim"></p>

    <ul id="list"></ul>

    <input type="text" id="inputItem" placeholder="Tambah item...">
    <button onclick="tambahItem()">Tambah</button>

    <script>
    // 1. Perbaiki URL agar tidak double 'info'
    const API_URL = 'http://localhost:5000/api'; 

    function loadData() {
        // Ini akan memanggil http://localhost:5000/api/info
        fetch(`${API_URL}/info`)
            .then(res => res.json())
            .then(data => {
                // Sesuai dengan JSON yang kamu dapat tadi: "nama", "nim", dan "menu"
                document.getElementById('judul').innerText = "Katalog Milik " + data.nama;
                document.getElementById('owner').innerText = "Nama: " + data.nama;
                document.getElementById('nim').innerText = "NIM: " + data.nim;

                let list = document.getElementById('list');
                list.innerHTML = '';

                // Gunakan 'data.menu' karena di JSON kamu kuncinya adalah "menu"
                data.menu.forEach(item => {
                    let li = document.createElement('li');
                    li.innerText = item;
                    list.appendChild(li);
                });
            })
            .catch(err => console.error("Gagal load data:", err));
    }

    function tambahItem() {
        let input = document.getElementById('inputItem');
        // Ini akan memanggil http://localhost:5000/api/add-item
        fetch(`${API_URL}/add-item`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({item: input.value})
        }).then(() => {
            input.value = '';
            loadData();
        });
    }

    loadData();
</script>
</body>
</html>
