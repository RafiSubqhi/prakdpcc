<!DOCTYPE html>
<html>
<head>
    <title>Gaming Loadout</title>
</head>
<body>
    <h1 id="judul"></h1>
    <p id="owner"></p>
    <p id="nim"></p>

    <ul id="list"></ul>

    <input type="text" id="inputItem" placeholder="Tambah item...">
    <button onclick="tambahItem()">Tambah</button>

    <script>
        // WAJIB: Menggunakan relative path agar Ingress AKS berfungsi
        const API_URL = '/api'; 

        function loadData() {
            fetch(`${API_URL}/info`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('judul').innerText = data.judul_katalog;
                    document.getElementById('owner').innerText = "Nama: " + data.pemilik;
                    document.getElementById('nim').innerText = "NIM: " + data.nim;

                    let list = document.getElementById('list');
                    list.innerHTML = '';

                    // Menampilkan list item dari backend[cite: 14, 21]
                    data.items.forEach(item => {
                        let li = document.createElement('li');
                        li.innerText = item;
                        list.appendChild(li);
                    });
                });
        }

        function tambahItem() {
            let input = document.getElementById('inputItem');

            fetch(`${API_URL}/add-item`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item: input.value})
            }).then(() => {
                input.value = '';
                loadData();
            });
        }

        // Jalankan fungsi saat halaman dimuat[cite: 21]
        loadData();
    </script>
</body>
</html>
